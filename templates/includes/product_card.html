{% load cart_tags %}
<!-- Product Card -->
<div class="col">
    <div class="card product-card h-100 border-0">
        <div class="card-img-wrapper">
            {% if product.image %}
                <img src="{{ product.image.url }}" class="card-img-top" alt="{{ product.name }}">
            {% else %}
                <div class="card-img-top placeholder-img d-flex align-items-center justify-content-center"
                     style="height: 260px; background: linear-gradient(135deg, #E8E0F3 0%, #FDE8E4 100%);">
                    <i class="bi bi-image" style="font-size: 3rem; color: #9B8EC4;"></i>
                </div>
            {% endif %}
            <span class="category-badge">{{ product.get_category_display }}</span>
        </div>
        <div class="card-body d-flex flex-column p-3">
            <span class="age-badge mb-2">
                <i class="bi bi-person-hearts me-1"></i>{{ product.get_age_range_display_name }}
            </span>
            <h5 class="card-title mb-1">{{ product.name }}</h5>
            <p class="card-price mb-3">£{{ product.price }}</p>
            <a href="{% url 'product_detail' pk=product.pk %}" class="btn btn-view-details mt-auto">
                View Details
            </a>
        </div>
    </div>
</div>
