# ==========================================
# Ipswich Retail — CI/CD Pipeline
# GitHub Actions: Build, Test, Deploy
# ==========================================

name: CI/CD Pipeline

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  # ---- STAGE 1: Lint & Test ----
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install coverage

      - name: Run migrations
        run: python manage.py migrate --noinput

      - name: Load sample data
        run: python manage.py load_sample_data

      - name: Run tests with coverage
        run: |
          coverage run manage.py test shop -v 2
          coverage report --show-missing
          coverage html

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/

  # ---- STAGE 2: Build Docker Image ----
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t ipswich-retail:${{ github.sha }} .

      - name: Test Docker container starts
        run: |
          docker run -d --name test-container -p 8000:8000 ipswich-retail:${{ github.sha }}
          sleep 5
          curl -f http://localhost:8000/ || exit 1
          docker stop test-container

  # ---- STAGE 3: Deploy to Render ----
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy to Render
        run: |
          echo "Deploying to Render.com..."
          echo "Render auto-deploys from the main branch."
          echo "Deployment triggered successfully."
